<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: Georgia, serif;
      background: #F7F4EE;
      color: #2F3A32;
    }
    .header {
      background: white;
      padding: 14px 16px;
      border-bottom: 1px solid #E7E0D6;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-img { height: 80px; width: auto; display: block; margin: 0 auto 4px; }
    .subtitle { font-size: 11px; color: #999; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; }
    .body { padding: 16px; }

    .state-detecting, .state-none {
      text-align: center;
      padding: 24px 16px;
      color: #888;
      font-size: 13px;
      font-style: italic;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #E7E0D6;
      border-top-color: #556257;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .recipe-found {
      display: none;
    }
    .recipe-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .recipe-meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      font-style: italic;
    }
    .field { margin-bottom: 10px; }
    .field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-bottom: 3px;
    }
    .field input, .field select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #E7E0D6;
      border-radius: 8px;
      font-family: Georgia, serif;
      font-size: 13px;
      background: white;
      color: #2F3A32;
      outline: none;
    }
    .field input:focus { border-color: #556257; }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: Georgia, serif;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #556257; color: white; }
    .btn-secondary { background: #EEF2EE; color: #556257; border: 1px solid #CFC8BC; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 20px 16px;
    }
    .success-icon { font-size: 40px; margin-bottom: 10px; }
    .success-title { font-size: 16px; font-weight: bold; margin-bottom: 6px; }
    .success-sub { font-size: 12px; color: #888; font-style: italic; }

    .error-msg {
      display: none;
      background: #FDEDEB;
      color: #C0392B;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }
    .translate-banner {
      background: #FEF6E4;
      border: 1px solid #E8C97A;
      color: #7A5B10;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 10px;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .btn-translate {
      background: #7A5B10;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      font-family: Georgia, serif;
    }
    .btn-translate:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="header">
    <div style="width: 100%;">
      <img src="fornello-logo.png" alt="Fornello" class="logo-img" />
      <div class="subtitle">Recipe Importer</div>
    </div>
  </div>

  <div class="body">
    <div class="state-detecting" id="detecting">
      <div class="spinner"></div>
      Looking for a recipe on this page…
    </div>

    <div class="state-none" id="no-recipe" style="display:none">
      🍽 No recipe found on this page.<br><br>
      Try visiting a recipe page on sites like<br>
      AllRecipes, NYT Cooking, Smitten Kitchen, etc.
    </div>

    <div class="recipe-found" id="recipe-found">
      <div class="recipe-name" id="recipe-name"></div>
      <div class="recipe-meta" id="recipe-meta"></div>

      <div class="field">
        <label>Recipe Name</label>
        <input id="f-name" type="text">
      </div>
      <div class="row">
        <div class="field">
          <label>Cuisine</label>
          <input id="f-cuisine" type="text" placeholder="e.g. Italian">
        </div>
        <div class="field">
          <label>Meal Type</label>
          <select id="f-mealtype">
            <option value="Any">Any</option>
            <option value="meat">🥩 Meat</option>
            <option value="chicken">🍗 Chicken</option>
            <option value="seafood">🦞 Seafood</option>
            <option value="pasta">🍝 Pasta</option>
            <option value="vegetarian">🥗 Vegetarian</option>
            <option value="soup or stew">🍜 Soup / Stew</option>
            <option value="Mexican">🌮 Mexican</option>
            <option value="Asian">🍣 Asian</option>
            <option value="legumes">🫘 Legumes</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Total Time</label>
          <input id="f-time" type="text" placeholder="e.g. 45 min">
        </div>
        <div class="field">
          <label>Serves</label>
          <input id="f-serves" type="number" min="1" max="20" value="4">
        </div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button class="btn btn-primary" id="btn-import">📥 Add to Recipes</button>
      <button class="btn btn-secondary" id="btn-translate" style="margin-top:6px">🌍 Translate to English</button>
      <button class="btn btn-secondary" id="btn-cancel" style="margin-top:6px">Cancel</button>
    </div>

    <div class="success" id="success">
      <div class="success-icon">✅</div>
      <div class="success-title" id="success-name"></div>
      <div class="success-sub">Added to your Fornello recipe library!</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
